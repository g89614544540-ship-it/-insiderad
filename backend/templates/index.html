<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mytonads</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0a1628;--bg2:#0d1f3c;--bg3:#0d2744;--bg4:#0a1628;--border:#1e4976;--text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.4);--text4:rgba(255,255,255,.3);--accent:#4a9eff;--accent2:rgba(74,158,255,.15);--accent3:rgba(74,158,255,.1);--orange:#f5a623;--orange2:#1a1508;--orange3:#4a3510;--orange4:rgba(245,166,35,.15);--green1:#0a6e3a;--green2:#0d9e52;--red:#ff4444;--cap-bg:rgba(5,10,20,.97)}
body.light{--bg:#f0f2f5;--bg2:#fff;--bg3:#e8edf2;--bg4:#f5f7fa;--border:#d0d5dd;--text:#1a1a2e;--text2:rgba(26,26,46,.6);--text3:rgba(26,26,46,.4);--text4:rgba(26,26,46,.3);--accent:#0066cc;--accent2:rgba(0,102,204,.12);--accent3:rgba(0,102,204,.08);--orange:#d4870a;--orange2:#fff8ed;--orange3:#e8d5b0;--orange4:rgba(212,135,10,.12);--green1:#0a6e3a;--green2:#0d9e52;--red:#cc0000;--cap-bg:rgba(240,242,245,.97)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}.hidden{display:none!important}.theme-btn{position:fixed;top:14px;right:14px;z-index:999;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}.theme-btn:active{transform:scale(.9)}.rs{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}.rl{font-size:64px;margin-bottom:12px}.rt{font-size:32px;font-weight:800;color:var(--accent)}.rsb{font-size:14px;color:var(--text4);margin:6px 0 50px}.rb{width:100%;max-width:320px;padding:20px;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:12px}.rb:active{transform:scale(.97)}.rv{background:var(--bg3);color:var(--accent);border:1px solid var(--border)}.ra{background:var(--orange2);color:var(--orange);border:1px solid var(--orange3)}.vs{display:none;min-height:100vh;padding-bottom:70px}.vh{background:var(--bg3);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-right:70px}.vht{font-size:18px;font-weight:700;color:var(--accent)}.vbb{background:var(--accent2);padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;color:var(--accent)}.aw{padding:20px;display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 140px)}.ac{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:400px}.am{width:100%;height:200px;border-radius:12px;overflow:hidden;margin-bottom:16px;background:var(--bg4);display:flex;align-items:center;justify-content:center}.am img,.am video{width:100%;height:100%;object-fit:cover}.ac h3{font-size:18px;margin-bottom:8px}.ac p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:16px}.al{display:block;text-align:center;padding:10px;background:var(--accent3);border-radius:10px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:600;margin-bottom:16px}.at2{font-size:52px;font-weight:800;color:var(--accent);text-align:center;margin:16px 0}.ap{width:100%;height:4px;background:var(--border);border-radius:2px;margin:16px 0;overflow:hidden}.apb{height:100%;background:linear-gradient(90deg,#0066cc,var(--accent));border-radius:2px;transition:width 1s linear;width:0%}.ar{text-align:center;font-size:14px;color:var(--accent);font-weight:600;margin-bottom:16px}.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,#0066cc,var(--accent))}.btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}.cnt{font-size:12px;color:var(--text4);margin-top:12px;text-align:center}.bn{position:fixed;bottom:0;left:0;width:100%;background:var(--bg2);display:flex;border-top:1px solid var(--border);padding:6px 0}.ni{flex:1;text-align:center;padding:8px;font-size:11px;opacity:.4;cursor:pointer;background:none;border:none;color:var(--text)}.ni.act{opacity:1;color:var(--accent)}.nico{font-size:20px;margin-bottom:2px}.ws{padding:20px}.wc{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;margin-bottom:16px}.wl{font-size:13px;color:var(--text3)}.wa{font-size:40px;font-weight:800;color:var(--accent);margin:8px 0}.wi{width:100%;padding:14px;background:var(--bg4);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none}.bw{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--green1),var(--green2))}.bw:disabled{background:var(--bg3);color:var(--text3)}.winf{font-size:12px;color:var(--text4);text-align:center;margin-top:10px}.cp{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--cap-bg);z-index:1000;align-items:center;justify-content:center;flex-direction:column}.cp.show{display:flex}.cpt{font-size:22px;font-weight:800;color:var(--red);margin:16px 0 8px}.cpx{font-size:16px;color:var(--text2);margin-bottom:24px}.cpm{font-size:64px;font-weight:800;color:var(--red);margin-bottom:24px}.cpi{width:100px;height:64px;text-align:center;font-size:36px;font-weight:800;background:var(--bg2);border:2px solid var(--border);border-radius:16px;color:var(--text);outline:none}.cph{font-size:13px;color:var(--text4);margin-top:16px}.as{display:none;min-height:100vh}.ah{background:var(--orange2);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--orange3);padding-right:70px}.aht{font-size:18px;font-weight:700;color:var(--orange)}.abb{background:var(--orange4);padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;color:var(--orange)}.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}.tab{flex:1;padding:14px;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text);opacity:.4;border-bottom:2px solid transparent}.tab.act{opacity:1;color:var(--orange);border-bottom-color:var(--orange)}.acn{padding:16px}.acd{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}.ig{margin-bottom:16px}.ig label{display:block;font-size:13px;color:var(--text3);margin-bottom:6px}.ig input,.ig textarea{width:100%;padding:14px;background:var(--bg4);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none}.ig textarea{height:90px;resize:none}.mu{width:100%;height:120px;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}.mu:hover{border-color:var(--orange)}.mp{width:100%;height:120px;border-radius:12px;overflow:hidden;margin-top:8px;display:none}.mp img,.mp video{width:100%;height:100%;object-fit:cover}.pd{background:var(--bg4);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;margin:16px 0}.pam{font-size:32px;font-weight:800;color:var(--orange)}.plb{font-size:12px;color:var(--text4);margin-top:4px}.bc{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,#d4870a,#f5a623)}.noads{text-align:center;padding:60px 20px}.noads-i{font-size:64px;margin-bottom:16px}.noads-t{font-size:18px;font-weight:700;margin-bottom:8px}.noads-s{font-size:14px;color:var(--text3)}.minfo{font-size:11px;color:var(--text4);margin-top:4px;text-align:center}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
<div id="R" class="rs">
<div class="rl">💎</div>
<div class="rt">Mytonads</div>
<div class="rsb">Рекламная биржа в Telegram</div>
<button class="rb rv" onclick="go('v')">👁 Смотреть рекламу</button>
<button class="rb ra" onclick="go('a')">📢 Разместить рекламу</button>
</div>
<div id="V" class="vs">
<div class="vh">
<div class="vht">💎 Mytonads</div>
<div class="vbb">💎 <span id="vB">0.00</span> TON</div>
</div>
<div id="vA"><div class="aw"><div class="ac" id="adCard"><div class="noads"><div class="noads-i">📭</div><div class="noads-t">Нет рекламы</div><div class="noads-s">Зайдите позже</div></div></div></div></div>
<div id="vW" class="ws hidden">
<div class="wc"><div class="wl">Баланс</div><div class="wa">💎 <span id="wB">0.00</span> TON</div></div>
<label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px">Адрес TON кошелька</label>
<input class="wi" id="wA" placeholder="UQ... или EQ..." oninput="chkW()">
<button class="bw" id="bWt" disabled onclick="doW()">Минимум 1.5 TON</button>
<div class="winf">Минимальный вывод: 1.5 TON</div>
</div>
<div class="bn">
<button class="ni act" id="n1" onclick="vt('a')"><div class="nico">👁</div>Реклама</button>
<button class="ni" id="n2" onclick="vt('w')"><div class="nico">💎</div>Кошелёк</button>
</div>
</div>
<div id="C" class="cp">
<div style="font-size:48px">🔒</div>
<div class="cpt">ПРОВЕРКА</div>
<div class="cpx" id="capQ">Введите число</div>
<div class="cpm" id="cT">3</div>
<input type="number" class="cpi" id="cI" oninput="chkC()">
<div class="cph">3 секунды или баланс сгорит!</div>
</div>
<div id="A" class="as">
<div class="ah">
<div class="aht">📢 Mytonads</div>
<div class="abb">Реклама</div>
</div>
<div class="tabs">
<button class="tab act" id="t1" onclick="at('c')">➕ Создать</button>
<button class="tab" id="t2" onclick="at('o')">📊 Заказы</button>
</div>
<div id="sC" class="acn"><div class="acd">
<div class="ig"><label>Медиа (фото или видео)</label>
<div class="mu" onclick="document.getElementById('mF').click()">
<div style="font-size:36px;opacity:.3">📷🎬</div>
<div style="font-size:13px;opacity:.4">Загрузить фото или видео</div>
<input type="file" id="mF" accept="image/*,video/*" onchange="prM(this)" style="display:none">
</div>
<div class="mp" id="mP"></div>
<div class="minfo" id="mInfo"></div>
</div> 
  <div class="ig"><label>Заголовок</label><input id="iT" placeholder="Название"></div>
<div class="ig"><label>Текст</label><textarea id="iTx" placeholder="Описание"></textarea></div>
<div class="ig"><label>Ссылка (обязательно)</label><input id="iL" placeholder="https://t.me/channel"></div>
<div class="ig"><label>Просмотры (мин 100)</label><input type="number" id="iV" min="100" value="100" oninput="calc()"></div>
<div class="pd"><div class="pam" id="pA">5.50 TON</div><div class="plb">100 просмотров = 5.50 TON</div></div>
<button class="bc" id="payBtn" onclick="payAndCreate()">💎 Оплатить через CryptoBot</button>
</div></div>
<div id="sO" class="acn hidden"><div id="ordersList" style="text-align:center;padding:40px;opacity:.3"><div style="font-size:48px;margin-bottom:12px">📋</div><p>Нет заказов</p></div></div>
</div>
<script>
var tg=window.Telegram.WebApp;tg.ready();tg.expand();
function getTheme(){return localStorage.getItem('mytonads_theme')||'dark'}
function setTheme(t){localStorage.setItem('mytonads_theme',t);if(t==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️'}else{document.body.classList.remove('light');document.getElementById('themeBtn').textContent='🌙'}}
function toggleTheme(){setTheme(getTheme()==='dark'?'light':'dark')}
setTheme(getTheme());
var capAnswer=0;
var REWARD=0.04;
var S={b:0,w:0,tot:0,nc:rc(),ti:null,ti2:null,tm:15,uid:null,busy:false,claim:false,adsList:[],curAd:null,seen:[],mediaB64:null,mediaCT:null,mediaName:null};
function rc(){return Math.floor(Math.random()*9)+5}
async function initUser(){try{var u=tg.initDataUnsafe&&tg.initDataUnsafe.user;if(u){var r=await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:u.id,username:u.username||''})});var d=await r.json();if(d.id){S.uid=d.id;S.b=parseFloat(d.balance)||0;S.tot=d.total_watched||0;upd()}}}catch(e){console.log(e)}}
initUser();
async function loadAds(){try{var r=await fetch('/api/ads');S.adsList=await r.json()}catch(e){S.adsList=[]}}
function go(r){document.getElementById('R').style.display='none';if(r=='v'){document.getElementById('V').style.display='block';startV()}else{document.getElementById('A').style.display='block'}}
async function startV(){await loadAds();showAd()}
function showAd(){
var av=S.adsList.filter(function(a){return S.seen.indexOf(a.id)===-1&&a.views_done<a.views_ordered});
var card=document.getElementById('adCard');
if(!av.length){card.innerHTML='<div class="noads"><div class="noads-i">📭</div><div class="noads-t">Нет рекламы</div><div class="noads-s">Зайдите позже</div></div>';return}
var ad=av[Math.floor(Math.random()*av.length)];S.curAd=ad;
var mb='';
if(ad.media_url&&ad.media_url.length>5){
if(ad.media_type==='video'){mb='<div class="am"><video src="'+ad.media_url+'" autoplay muted loop playsinline preload="auto"></video></div>'}
else{mb='<div class="am"><img src="'+ad.media_url+'" onerror="this.parentElement.style.display=\'none\'"></div>'}
}
S.tm=15;S.busy=false;S.claim=false;
card.innerHTML=mb+'<h3>'+ad.title+'</h3><p>'+(ad.description||'')+'</p><a href="'+ad.link+'" class="al" target="_blank">Перейти →</a><div class="at2" id="aTm">15</div><div class="ap"><div class="apb" id="aBar"></div></div><div class="ar">💎 +'+REWARD+' TON</div><button class="btn" id="bW" disabled onclick="watched()">Подождите... 15</button><div class="cnt">Просмотрено: '+S.tot+'</div>';
clearInterval(S.ti);clearInterval(S.ti2);
S.ti=setInterval(function(){S.tm--;
var tm=document.getElementById('aTm');if(tm)tm.textContent=S.tm;
var bar=document.getElementById('aBar');if(bar)bar.style.width=((15-S.tm)/15*100)+'%';
var bw=document.getElementById('bW');if(bw)bw.textContent='Подождите... '+S.tm;
if(S.tm<=0){clearInterval(S.ti);S.claim=true;
if(bw){bw.disabled=false;bw.textContent='✅ Получить '+REWARD+' TON (3)'}
var ct=3;
S.ti2=setInterval(function(){ct--;var bw2=document.getElementById('bW');
if(ct<=0){clearInterval(S.ti2);S.claim=false;
if(bw2){bw2.disabled=true;bw2.textContent='⏰ Пропущено!'}
setTimeout(function(){S.seen.push(ad.id);showAd()},1500)}
else{if(bw2)bw2.textContent='✅ Получить '+REWARD+' TON ('+ct+')'}
},1000)}},1000)
}
async function watched(){
if(S.busy||!S.claim||!S.curAd)return;
S.busy=true;S.claim=false;clearInterval(S.ti2);
var bw=document.getElementById('bW');
if(bw){bw.disabled=true;bw.textContent='Загрузка...'}
S.b+=REWARD;S.w++;S.tot++;S.seen.push(S.curAd.id);upd();
try{await fetch('/api/watch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:S.uid,ad_id:S.curAd.id})})}catch(e){}
if(S.w>=S.nc){showCap();return}showAd()
}
function upd(){
var vb=document.getElementById('vB');if(vb)vb.textContent=S.b.toFixed(2);
var wb=document.getElementById('wB');if(wb)wb.textContent=S.b.toFixed(2);chkW()
}
function showCap(){
capAnswer=Math.floor(Math.random()*11);
document.getElementById('capQ').textContent='Введите число '+capAnswer;
document.getElementById('C').classList.add('show');
document.getElementById('cI').value='';
var t=3;document.getElementById('cT').textContent=t;
clearInterval(S.ti);clearInterval(S.ti2);
S.ti=setInterval(function(){t--;
document.getElementById('cT').textContent=t;
if(t<=0){clearInterval(S.ti);capF()}
},1000);
setTimeout(function(){document.getElementById('cI').focus()},100)
}
function chkC(){if(document.getElementById('cI').value==String(capAnswer)){clearInterval(S.ti);capOk()}}
function capOk(){document.getElementById('C').classList.remove('show');S.w=0;S.nc=rc();showAd()}
function capF(){document.getElementById('C').classList.remove('show');S.b=0;S.w=0;S.nc=rc();upd();alert('Баланс сгорел!');showAd()}
function vt(t){
document.getElementById('n1').className='ni'+(t=='a'?' act':'');
document.getElementById('n2').className='ni'+(t=='w'?' act':'');
document.getElementById('vA').className=t=='a'?'':'hidden';
document.getElementById('vW').className=t=='w'?'ws':'ws hidden'
}
function chkW(){
var a=document.getElementById('wA');if(!a)return;var b=document.getElementById('bWt');
if(S.b>=1.5&&a.value.length>10){b.disabled=false;b.textContent='Вывести '+S.b.toFixed(2)+' TON'}
else if(S.b<1.5){b.disabled=true;b.textContent='Минимум 1.5 TON ('+S.b.toFixed(2)+')'}
else{b.disabled=true;b.textContent='Введите адрес'}
}
async function doW(){
var a=document.getElementById('wA').value;
if(S.b>=1.5&&a.length>10){var btn=document.getElementById('bWt');
btn.disabled=true;btn.textContent='Вывод...';
try{var r=await fetch('/api/withdraw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:S.uid,wallet_address:a})});
var d=await r.json();
if(d.success){alert('Выведено: '+d.amount+' TON');S.b=0;upd();if(d.check_url){window.open(d.check_url,'_blank')}}
else{alert(d.error||'Ошибка');btn.disabled=false;btn.textContent='Вывести '+S.b.toFixed(2)+' TON'}}
catch(e){alert('Ошибка: '+e);btn.disabled=false;btn.textContent='Вывести '+S.b.toFixed(2)+' TON'}}
}
function calc(){
var v=Math.max(100,parseInt(document.getElementById('iV').value)||100);
var p=(v/100*5.5).toFixed(2);
document.getElementById('pA').textContent=p+' TON';
document.querySelector('.plb').textContent=v+' просмотров = '+p+' TON'
}
function formatSize(b){if(b<1024*1024)return(b/1024).toFixed(1)+' KB';return(b/(1024*1024)).toFixed(1)+' MB'}
function prM(el){
var f=el.files[0];if(!f)return;
var isV=f.type.startsWith('video');
var max=isV?20*1024*1024:5*1024*1024;
var ml=isV?'20MB':'5MB';
if(f.size>max){alert('Максимум '+ml);el.value='';return}
S.mediaName=f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
S.mediaCT=f.type;
document.getElementById('mInfo').textContent=(isV?'🎬 Видео: ':'📷 Фото: ')+formatSize(f.size)+' (макс '+ml+')';
var rd=new FileReader();var p=document.getElementById('mP');
rd.onload=function(e){S.mediaB64=e.target.result.split(',')[1];
if(isV){p.innerHTML='<video src="'+e.target.result+'" autoplay muted loop playsinline></video>'}
else{p.innerHTML='<img src="'+e.target.result+'">'}
p.style.display='block'};rd.readAsDataURL(f)
}
async function payAndCreate(){
var t=document.getElementById('iT').value;
var tx=document.getElementById('iTx').value;
var l=document.getElementById('iL').value;
var v=Math.max(100,parseInt(document.getElementById('iV').value)||100);
if(!t||!l){alert('Заполните заголовок и ссылку!');return}
var price=(v/100*5.5);
var btn=document.getElementById('payBtn');
btn.disabled=true;btn.textContent='Создание...';
var mediaUrl='';var mediaType='text';
if(S.mediaB64){try{btn.textContent='Загрузка медиа...';
var ur=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_data:S.mediaB64,file_name:S.mediaName,content_type:S.mediaCT})});
var ud=await ur.json();
if(ud.url){mediaUrl=ud.url;mediaType=S.mediaCT.startsWith('video')?'video':'image'}
else{alert('Ошибка загрузки: '+(ud.error||''))}}catch(e){alert('Ошибка: '+e)}}
try{btn.textContent='Создание рекламы...';
var cr=await fetch('/api/ads/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,description:tx,link:l,media_url:mediaUrl,media_type:mediaType,views_ordered:v,price_paid:price})});
var ad=await cr.json();
if(!ad.id){btn.disabled=false;btn.textContent='💎 Оплатить через CryptoBot';alert('Ошибка: '+(ad.error||''));return}
btn.textContent='Создание счёта...';
var ir=await fetch('/api/create_invoice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ad_id:ad.id,amount:price})});
var inv=await ir.json();
