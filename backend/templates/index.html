  <script>
var tg=window.Telegram.WebApp;try{tg.ready();tg.expand()}catch(e){}
var VIP=['melariiiii','Orgazmgarant','Ton_ads_support'];
var curUser='';
try{var uu=tg.initDataUnsafe&&tg.initDataUnsafe.user;if(uu)curUser=uu.username||''}catch(e){}
function isVip(){return VIP.indexOf(curUser)!==-1}
function getWait(){return isVip()?5:15}

function getTheme(){return localStorage.getItem('mt_theme')||'dark'}
function setTheme(t){localStorage.setItem('mt_theme',t);if(t==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️'}else{document.body.classList.remove('light');document.getElementById('themeBtn').textContent='🌙'}}

setTheme(getTheme());

var capA=0,RW_S=0.04,RW_P=0.06,REF_PCT=0.10,cF='standard';
var S={b:0,w:0,tot:0,nc:rc(),ti:null,ti2:null,tm:15,uid:null,busy:false,clm:false,ads:[],cur:null,seen:[],mB:null,mC:null,mN:null,sc:false,sf:false,refCode:'',refCount:0,refEarned:0};
function rc(){return Math.floor(Math.random()*9)+5}

function goBack(){
clearInterval(S.ti);clearInterval(S.ti2);
document.getElementById('V').style.display='none';
document.getElementById('A').style.display='none';
document.getElementById('R').style.display='flex';
document.getElementById('backBtn').style.display='none';
}

function go(r){
document.getElementById('R').style.display='none';
document.getElementById('backBtn').style.display='flex';
if(r==='v'){document.getElementById('V').style.display='block';startV()}
else{document.getElementById('A').style.display='block'}
}

function setFilter(f){
cF=f;
document.getElementById('fStd').className='fbtn'+(f==='standard'?' act':'');
document.getElementById('fPro').className='fbtn fp'+(f==='pro'?' act':'');
showAd();
}

function getRefFromUrl(){
try{
var p=new URLSearchParams(window.location.search);
var r=p.get('ref');
if(r)return r;
var sp=tg.initDataUnsafe&&tg.initDataUnsafe.start_param;
if(sp)return sp;
}catch(e){}
return null;
}

async function initUser(){
try{
var u=tg.initDataUnsafe&&tg.initDataUnsafe.user;
if(u){
var ref=getRefFromUrl();
var body={telegram_id:u.id,username:u.username||''};
if(ref)body.referrer_code=ref;
var r=await fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
var d=await r.json();
if(d.id){
S.uid=d.id;
S.b=parseFloat(d.balance)||0;
S.tot=d.total_watched||0;
S.refCode=d.ref_code||'';
S.refCount=d.ref_count||0;
S.refEarned=parseFloat(d.ref_earned)||0;
upd();
updRef();
}
}
}catch(e){console.log(e)}
}
initUser();

function updRef(){
var link=document.getElementById('refLink');
if(link&&S.refCode){
var botName='mytonads_bot';
var url='https://t.me/'+botName+'?start='+S.refCode;
link.textContent=url;
link.setAttribute('data-url',url);
}
var rc=document.getElementById('refCount');
if(rc)rc.textContent=S.refCount;
var re=document.getElementById('refEarned');
if(re)re.textContent=S.refEarned.toFixed(2);
}

function copyRef(){
var link=document.getElementById('refLink');
var url=link.getAttribute('data-url')||link.textContent;
if(navigator.clipboard){
navigator.clipboard.writeText(url).then(function(){
var btn=document.querySelector('.ref-copy');
btn.textContent='✅ Скопировано!';
setTimeout(function(){btn.textContent='📋 Копировать'},2000);
});
}else{
var ta=document.createElement('textarea');
ta.value=url;document.body.appendChild(ta);
ta.select();document.execCommand('copy');
document.body.removeChild(ta);
var btn=document.querySelector('.ref-copy');
btn.textContent='✅ Скопировано!';
setTimeout(function(){btn.textContent='📋 Копировать'},2000);
}
}

async function loadAds(){
try{var r=await fetch('/api/ads');S.ads=await r.json()}catch(e){S.ads=[]}
}

async function startV(){await loadAds();showAd()}

function showAd(){
var wt=getWait();
var av=S.ads.filter(function(a){
if(S.seen.indexOf(a.id)!==-1)return false;
if(a.views_done>=a.views_ordered)return false;
if((a.tariff||'standard')!==cF)return false;
return true;
});

}

else{mb='<div class="am"><img src="'+ad.media_url+'" onerror="this.parentElement.style.display=\'none\'"></div>'}
}
